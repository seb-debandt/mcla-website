          - { label: "Navigation Order", name: "navOrder", widget: "number", value_type: "int", required: false, hint: "Position in menu group (1=first, 2=second, etc.)" }
          - { label: "Subtitle", name: "subtitle", widget: "text", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "CTA Button Text", name: "ctaText", widget: "string", required: false }
          - { label: "CTA Button URL", name: "ctaUrl", widget: "string", required: false }
