backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Research", "Patient Stories", "News", "Events"] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "team"
    label: "Team Members"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Role Type", name: "roleType", widget: "select", options: ["board", "advisory", "staff"] }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int" }

  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Link", name: "link", widget: "string", required: false }

  - name: "resources"
    label: "Resources"
    folder: "src/content/resources"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "File", name: "file", widget: "file" }
      - { label: "Category", name: "category", widget: "select", options: ["Patient Guide", "Research", "Caregiver", "General"] }

  - name: "pages"
    label: "Pages"
    files:
      # ── Home ──
      - label: "Home"
        name: "home"
        file: "src/content/pages/home.md"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "Home" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Navigation Menu", name: "navMenu", widget: "select", options: ["None", "About", "Understanding MCL", "Research", "Get Involved", "Top Level"], default: "None", required: false }
          - { label: "Navigation Label", name: "navLabel", widget: "string", required: false, hint: "Text shown in menu (defaults to page title if empty)" }
          - { label: "Navigation Order", name: "navOrder", widget: "number", value_type: "int", required: false, hint: "Position in menu group (1=first, 2=second, etc.)" }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Highlighted Text", name: "heroHighlight", widget: "string" }
          - { label: "Hero Description", name: "heroDescription", widget: "text" }
          - { label: "Primary Button Text", name: "heroPrimaryText", widget: "string" }
          - { label: "Primary Button URL", name: "heroPrimaryUrl", widget: "string" }
          - { label: "Secondary Button Text", name: "heroSecondaryText", widget: "string" }
          - { label: "Secondary Button URL", name: "heroSecondaryUrl", widget: "string" }
          - { label: "Mission Statement", name: "missionStatement", widget: "text" }
          - { label: "Pillars Heading", name: "pillarsHeading", widget: "string" }
          - { label: "Pillars Subheading", name: "pillarsSubheading", widget: "string" }
          - label: "Pillars"
            name: "pillars"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "href", widget: "string" }
          - { label: "Stats Heading", name: "statsHeading", widget: "string" }
          - { label: "Stats Subheading", name: "statsSubheading", widget: "string" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "Stats Source", name: "statsSource", widget: "text" }

      # ── About ──
      - label: "Mission & Values"
        name: "mission"
        file: "src/content/pages/mission.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Navigation Menu", name: "navMenu", widget: "select", options: ["None", "About", "Understanding MCL", "Research", "Get Involved", "Top Level"], default: "None", required: false }
          - { label: "Navigation Label", name: "navLabel", widget: "string", required: false, hint: "Text shown in menu (defaults to page title if empty)" }
          - { label: "Navigation Order", name: "navOrder", widget: "number", value_type: "int", required: false, hint: "Position in menu group (1=first, 2=second, etc.)" }
          - { label: "Subtitle", name: "subtitle", widget: "text", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "Mission Statement", name: "missionStatement", widget: "text" }
          - { label: "Vision", name: "vision", widget: "text" }
          - label: "Values"
            name: "values"
            widget: "list"
